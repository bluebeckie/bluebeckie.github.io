---
layout: default
---
<article class="py-16 bg-white">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <header class="mb-10">
            <h1 class="text-3xl sm:text-4xl font-bold mb-4" style="color: var(--color-navy);">
                {{ page.title }}
            </h1>
            <div class="flex items-center space-x-4 text-sm text-slate-500">
                <time datetime="{{ page.date | date_to_xmlschema }}">
                    {{ page.date | date: "%B %-d, %Y" }}
                </time>
                {% if page.lang %}
                <span class="px-2 py-0.5 rounded-full border border-slate-300 text-xs"
                      style="background-color: var(--color-light-sage);">
                    {{ page.lang | upcase }}
                </span>
                {% endif %}
                {% if page.categories.size > 0 %}
                <span>{{ page.categories | join: ", " }}</span>
                {% endif %}
            </div>
        </header>

        <div class="prose-content">
            {{ content }}
        </div>

        <div class="mt-12 pt-6 border-t border-slate-200">
            <a href="{{ '/blog/' | relative_url }}" class="text-sm font-medium hover:underline"
               style="color: var(--color-dusty-teal);">
                &larr; Back to Blog
            </a>
        </div>
    </div>
</article>
