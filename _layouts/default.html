{% assign lang = page.lang | default: "en" %}
{% assign t = site.data.i18n[lang] %}
<!DOCTYPE html>
<html lang="{{ lang }}">
{% include head.html lang=lang t=t %}
<body>
    {% include header.html lang=lang t=t %}

    <main>
        {{ content }}
    </main>

    {% include footer.html lang=lang t=t %}

    <script src="{{ '/assets/main.js' | relative_url }}"></script>
</body>
</html>
