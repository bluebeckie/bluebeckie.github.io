title: "Beckie Fang | AI & Digital Transformation Consultant"
description: "Senior consultant specializing in corporate AI strategy, digital transformation, and executive advisory."
url: "https://beckiefang.com"
baseurl: ""

# Cloudflare Web Analytics (cookieless, no consent banner needed)
cloudflare_beacon: "4b9a1bef5f154aa5bbefc091ab6a0902"

markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - src/
  - node_modules/
  - .DS_Store

collections:
  case_studies:
    output: true
    permalink: /case-studies/:title/
  zh_tw_posts:
    output: true
    permalink: /zh-tw/blog/:year/:month/:day/:title/
  zh_tw_case_studies:
    output: true
    permalink: /zh-tw/case-studies/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "en"
  - scope:
      path: ""
      type: "case_studies"
    values:
      layout: "case-study"
      lang: "en"
  - scope:
      path: ""
      type: "zh_tw_posts"
    values:
      layout: "post"
      lang: "zh-tw"
  - scope:
      path: ""
      type: "zh_tw_case_studies"
    values:
      layout: "case-study"
      lang: "zh-tw"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      lang: "en"

paginate: 10
paginate_path: "/blog/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-redirect-from
