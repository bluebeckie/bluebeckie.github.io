<section id="proof" class="py-16 -mt-10" aria-labelledby="proof-points-heading">
    <h2 id="proof-points-heading" class="sr-only">{{ include.t.proof_points_heading | default: "Highlights" }}</h2>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for pp in include.t.proof_points %}
            <div class="metric-box p-6 sm:p-8 text-center">
                <div class="text-5xl font-extrabold text-peach-accent mb-2" aria-hidden="true">{{ pp.value }}</div>
                <h3 class="text-xl font-semibold mb-3" style="color: var(--color-navy);">{{ pp.title }}</h3>
                <p class="text-slate-600 text-sm">{{ pp.text }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
