{% assign t = include.t %}
<section id="contact" class="py-24 bg-white">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8" style="display:none;">
        <h2 class="text-3xl sm:text-4xl font-bold mb-4 text-center" style="color: var(--color-navy);">
            <span style="color: var(--color-dusty-teal);">{{ t.contact.title }}</span>
        </h2>
        <p class="text-xl text-slate-600 mb-12 text-center">
            {{ t.contact.description }}
        </p>

        <form onsubmit="handleFormSubmit(event)" class="space-y-6 p-8 bg-slate-100 rounded-xl shadow-lg border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="form-name" class="block text-sm font-medium text-slate-700">{{ t.contact.form.name }}</label>
                    <input type="text" id="form-name" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500 border p-3">
                </div>
                <div>
                    <label for="form-company" class="block text-sm font-medium text-slate-700">{{ t.contact.form.company }}</label>
                    <input type="text" id="form-company" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500 border p-3">
                </div>
            </div>
            <div>
                <label for="form-email" class="block text-sm font-medium text-slate-700">{{ t.contact.form.email }}</label>
                <input type="email" id="form-email" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500 border p-3">
            </div>
            <div>
                <label for="form-message" class="block text-sm font-medium text-slate-700">{{ t.contact.form.message }}</label>
                <textarea id="form-message" rows="4" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500 border p-3"></textarea>
            </div>
            <div>
                <button type="submit" class="w-full py-3 px-4 rounded-xl btn-accent font-semibold text-lg">
                    {{ t.contact.form.submit }}
                </button>
            </div>
        </form>
    </div>
</section>
