{% assign t = include.t %}
{% assign lang = include.lang %}
<header class="sticky top-0 z-50 bg-navy-section shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <a href="{{ t.links.home | relative_url }}" class="text-xl font-bold text-white tracking-wider">
            Beckie Fang
        </a>

        <nav class="hidden md:flex space-x-8">
            <a href="{{ t.links.home | relative_url }}#home" class="text-white hover:text-light-sage transition">{{ t.nav.home }}</a>
            <a href="{{ t.links.home | relative_url }}#expertise" class="text-white hover:text-light-sage transition">{{ t.nav.expertise }}</a>
            <a href="{{ t.links.case_studies | relative_url }}" class="text-white hover:text-light-sage transition">{{ t.nav.case_studies }}</a>
            <a href="{{ t.links.blog | relative_url }}" class="text-white hover:text-light-sage transition">{{ t.nav.blog }}</a>
            <a href="{{ t.links.contact | relative_url }}" class="text-white hover:text-light-sage transition">{{ t.nav.contact }}</a>
        </nav>

        {% include lang-switcher.html lang=lang %}
    </div>
</header>
